name: srwm Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build Static Binary
        run: |
          nix develop --command make build VERSION=${{ github.ref_name }}

      - name: Rename and Prepare
        run: |
          mkdir -p dist
          cp srwm dist/srwm-${{ github.ref_name }}-linux-amd64

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/srwm-*-linux-amd64
          generate_release_notes: true
          draft: false
          prerelease: false
