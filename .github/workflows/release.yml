name: srwm Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build Static Binary with Nix
        run: nix build .#default --print-build-logs

      - name: Rename and Prepare
        run: |
          mkdir -p dist
          BINARY_NAME="srwm-${{ github.ref_name }}-linux-amd64"
          cp result/bin/srwm "dist/$BINARY_NAME"
          cd dist
          sha256sum "$BINARY_NAME" > "$BINARY_NAME.sha256"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/srwm-*-linux-amd64
            dist/srwm-*-linux-amd64.sha256
          generate_release_notes: true
          draft: false
          prerelease: false
