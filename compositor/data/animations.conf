## ----- Shadows ----- ##

shadow = true;

shadow-radius = 30;
shadow-opacity = 0.65;
shadow-offset-x = -30;
shadow-offset-y = -30;

shadow-color = "#000000"

## ----- Fading ----- ##

fading = true;

fade-in-step = 0.5;
fade-out-step = 1;
fade-delta = 10;

## ----- Corners ----- ##

corner-radius = 10

backend = "egl";
vsync = true;

unredir-if-possible = false;

detect-client-opacity = true;
use-damage = true;


blur: {
  method = "dual_kawase";
  strength = 10;
  background = true;
  background-frame = false;
  background-fixed = true;
  kern = "3x3box";
}
rules: (

		{
		match = "window_type = 'normal'";
		shadow = true;	#-shadow-switch
	},

	{
		match = "window_type = 'dialog'";
		shadow = true;	#-shadow-switch
	},

    {
		match = "fullscreen";
		corner-radius = 0;
	},
  
  {
		match = "window_type = 'dock'";
		corner-radius = 0;
		shadow = false;
		fade = true;
	},
  {
		match = "class_g = 'dmenu'";
		corner-radius = 0;
		# fade = true;
    shadow = false;
	},

	{
		match = "window_type = 'dropdown_menu' || window_type = 'menu' || window_type = 'popup' || window_type = 'popup_menu' || window_type = 'utility'";
		corner-radius = 0;
    blur-background = false;
    shadow = false;
	},
    {
        match = "window_type = 'srwm'";
        shadow = false;
        blur-background = false;
        corner-radius = 0;
    },
{
        match = "window_type = 'normal'";
        animations = (
            {
                triggers = ["close"];
                opacity = {
                    curve = "cubic-bezier(0.22,0.9,0.36,1)";
                    duration = 0.4;
                    start = 1;
                    end = 0;
                };
                blur-opacity = "opacity";
                shadow-opacity = "opacity";

                scale-x = {
                    curve = "cubic-bezier(0,0.9,1,1)";
                    duration = 0.5;
                    start = 1;
                    end = 0.9;
                };
                scale-y = "scale-x";

                offset-x = "(1 - scale-x) / 2 * window-width";
                offset-y = "(1 - scale-y) / 2 * window-height";

                shadow-scale-x = "scale-x";
                shadow-scale-y = "scale-y";
                shadow-offset-x = "offset-x";
                shadow-offset-y = "offset-y";
            },

            {
                triggers = ["open"];
                opacity = {
                    curve = "cubic-bezier(0.22,1.3,0.36,1)";
                    duration = 0.85;
                    start = 0.5;
                    end = 1;
                };
                blur-opacity = "opacity";
                shadow-opacity = "opacity";

                scale-x = {
                    curve = "cubic-bezier(0.22,1.3,0.36,1)";
                    duration = 0.85;
                    start = 0.5;
                    end = 1;
                };
                scale-y = "scale-x";

                offset-x = "(1 - scale-x) / 2 * window-width";
                offset-y = "(1 - scale-y) / 2 * window-height";

                shadow-scale-x = "scale-x";
                shadow-scale-y = "scale-y";
                shadow-offset-x = "offset-x";
                shadow-offset-y = "offset-y";
            },

            {
                triggers = ["geometry"];
                scale-x = {
                    curve = "cubic-bezier(0.22,1.3,0.36,1)";
                    duration = 0.7;
                    start = "window-width-before / window-width";
                    end = 1;
                };

                scale-x-reverse = {
                    curve = "cubic-bezier(0.22,1.3,0.36,1)";
                    duration = 0.7;
                    start = "window-width / window-width-before";
                    end = 1;
                };
                scale-y = {
                    curve = "cubic-bezier(0.22,1.3,0.36,1)";
                    duration = 0.7;
                    start = "window-height-before / window-height";
                    end = 1;
                };
                scale-y-reverse = {
                    curve = "cubic-bezier(0.22,1.3,0.36,1)";
                    duration = 0.7;
                    start = "window-height / window-height-before";
                    end = 1;
                };
                offset-x = {
                    curve = "cubic-bezier(0.22,1.3,0.36,1)";
                    duration = 0.7;
                    start = "window-x-before - window-x";
                    end = 0;
                };
                offset-y = {
                    curve = "cubic-bezier(0.22,1.3,0.36,1)";
                    duration = 0.7;
                    start = "window-y-before - window-y";
                    end = 0;
                };
                shadow-scale-x = "scale-x";
                shadow-scale-y = "scale-y";
                shadow-offset-x = "offset-x";
                shadow-offset-y = "offset-y";
            }

        )
    },
{
    match = "class_g = 'dmenu'";
    animations = (
    {
        triggers = ["close", "hide"];
        preset = "slide-out";
        direction = "up";
        duration = 0.1;
        scale = 0.5;
    },
    {
        triggers = ["open", "show"];
        preset = "slide-in";
        direction: "up";
        duration = 0.2;
        scale = 0.5;
    }
    )
},
{
    match = "class_g = 'Dunst'";
    animations = (
    {
        triggers = ["close", "hide"];
        preset = "slide-out";
        direction = "up";
        duration = 0.1;
        scale = 0.5;
    },
    {
        triggers = ["open", "show"];
        preset = "slide-in";
        direction: "up";
        duration = 0.2;
        scale = 0.5;
    }
    )
},
)
